name: Update Changelog JSON
on:
  release:
    types: [published]

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Update updates.json
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          DATE=$(date +%Y-%m-%d)
          TITLE="${{ github.event.release.name }}"
          BODY="${{ github.event.release.body }}"

          python3 -c "
          import json, os
          file_path = 'updates.json'
          # Prepare body: escape backslashes and quotes, replace newlines
          body_escaped = '''$BODY'''.replace('\', '\\\\').replace('\'', '\\\'').replace('"', '\\"').split('\n')
          
          new_entry = {
              'version': '$VERSION',
              'date': '$DATE',
              'title': '$TITLE',
              'changes': [line.strip() for line in body_escaped if line.strip()]
          }
          if os.path.exists(file_path):
              with open(file_path, 'r') as f:
                  data = json.load(f)
          else:
              data = []
          data.insert(0, new_entry)
          with open(file_path, 'w') as f:
              json.dump(data[:20], f, indent=2)
          "

      - name: Commit & Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.json
          # Commit only if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: Update changelog for version ${{ github.event.release.tag_name }}"
            git push
          fi
