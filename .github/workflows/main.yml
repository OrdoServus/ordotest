name: Update Changelog JSON

on: 
  release:
    types: [published]

jobs:
  update-json:
    runs-on: ubuntu-latest
    permissions:
      # Give the workflow's token write permission to the repository
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run changelog update script
        # Pass release data as environment variables to the Python script
        env:
          VERSION: ${{ github.event.release.tag_name }}
          TITLE: ${{ github.event.release.name }}
          BODY: ${{ github.event.release.body }}
          DATE_ISO: ${{ github.event.release.published_at }}
        run: python .github/scripts/update_changelog.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.json
          # Commit only if there are actual changes to the file
          if git diff --staged --quiet; then
            echo "No changes to commit, skipping commit and push."
          else
            git commit -m "chore: Update changelog for release ${{ github.event.release.tag_name }}"
            git push
          fi
